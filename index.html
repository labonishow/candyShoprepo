//This is Html code
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Candy Shop</title>

    <link rel="stylesheet" href="style.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">Candy Shop</div>

            <div class="card-body">
              <form onsubmit="handleFormSubmit(event)">
                <div class="mb-3">
                  <label for="candyname" class="form-label fw-bold"> Candy Name </label>
                  <input
                    type="text"
                    class="form-control"
                    name="candyname"
                    id="candyname"
                    placeholder="Enter Candy Name"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="description" class="form-label fw-bold"> Description </label>
                  <input
                    type="text"
                    class="form-control"
                    name="description"
                    id="description"
                    placeholder="Enter Description"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="price" class="form-label fw-bold"> Price </label>
                  <input
                    type="number"
                    class="form-control"
                    name="price"
                    id="price"
                    placeholder="Enter Price"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="quantity" class="form-label fw-bold"> Quantity </label>
                  <input
                    type="number"
                    class="form-control"
                    name="quantity"
                    id="quantity"
                    placeholder="Enter Quantity"
                    required
                  />
                </div>

                <button class="btn btn-primary">Add Item</button>
              </form>

              <hr class="my-4" />

              <h4 class="text-center mb-3">Candy Items</h4>

              <ul class="list-unstyled" id="itemList"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
    <script src="
https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js
"></script>
  </body>
</html>
